name: sirah_app
description: "Asmāʾ an-Nabī — Les 201 noms du Prophète Muḥammad ﷺ"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State management
  flutter_riverpod: ^2.5.1

  # Navigation
  go_router: ^14.6.2

  # Local persistence
  hive_ce: ^2.6.0
  hive_ce_flutter: ^2.2.0

  # Immutable models
  freezed_annotation: ^3.1.0
  json_annotation: ^4.11.0

  # Fonts
  google_fonts: ^6.2.1

  # Animations
  flutter_animate: ^4.5.2

  # Notifications
  flutter_local_notifications: ^20.1.0
  timezone: ^0.10.1

  # Sharing
  share_plus: ^9.0.0

  # File paths (for desktop Hive init)
  path_provider: ^2.1.5

  # i18n + dates hijri
  intl: ^0.20.2
  hijri: ^3.0.0
  url_launcher: ^6.3.2

dependency_overrides:
  # xml 6.6.x bumped to petitparser ^7.0.0 which fails to compile on Dart 3.9.2.
  # Pin to 6.5.0 (still within flutter_local_notifications_windows' ^6.5.0 constraint)
  # so pub resolves petitparser to 6.x, which works correctly.
  xml: 6.5.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.14.1
  freezed: ^3.2.5
  json_serializable: ^6.13.1
  hive_ce_generator: ^1.11.1
  flutter_native_splash: ^2.4.3
  flutter_launcher_icons: ^0.14.1

flutter_launcher_icons:
  # Ajouter l'asset quand disponible : android: true, ios: true, image_path: "assets/images/icon.png"
  # Pour l'instant désactivé — décommenter quand l'icône sera fournie.

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/data/

  fonts:
    - family: Amiri
      fonts:
        - asset: assets/fonts/amiri/Amiri-Regular.ttf
          weight: 400
        - asset: assets/fonts/amiri/Amiri-Bold.ttf
          weight: 600
        - asset: assets/fonts/amiri/Amiri-Bold.ttf
          weight: 700
    - family: Amiri Quran
      fonts:
        - asset: assets/fonts/amiri_quran/AmiriQuran-Regular.ttf
          weight: 400
    - family: Crimson Pro
      fonts:
        - asset: assets/fonts/crimson_pro/CrimsonPro-Variable.ttf
          weight: 400
        - asset: assets/fonts/crimson_pro/CrimsonPro-Variable.ttf
          weight: 600
        - asset: assets/fonts/crimson_pro/CrimsonPro-Variable.ttf
          weight: 700
        - asset: assets/fonts/crimson_pro/CrimsonPro-Italic-Variable.ttf
          style: italic
          weight: 400
        - asset: assets/fonts/crimson_pro/CrimsonPro-Italic-Variable.ttf
          style: italic
          weight: 600
        - asset: assets/fonts/crimson_pro/CrimsonPro-Italic-Variable.ttf
          style: italic
          weight: 700
    - family: Inter
      fonts:
        - asset: assets/fonts/inter/Inter-Variable.ttf
          weight: 400
        - asset: assets/fonts/inter/Inter-Variable.ttf
          weight: 600
        - asset: assets/fonts/inter/Inter-Variable.ttf
          weight: 700
        - asset: assets/fonts/inter/Inter-Italic-Variable.ttf
          style: italic
          weight: 400
        - asset: assets/fonts/inter/Inter-Italic-Variable.ttf
          style: italic
          weight: 600
        - asset: assets/fonts/inter/Inter-Italic-Variable.ttf
          style: italic
          weight: 700
    - family: Playfair Display
      fonts:
        - asset: assets/fonts/playfair_display/PlayfairDisplay-Variable.ttf
          weight: 400
        - asset: assets/fonts/playfair_display/PlayfairDisplay-Variable.ttf
          weight: 600
        - asset: assets/fonts/playfair_display/PlayfairDisplay-Variable.ttf
          weight: 700
        - asset: assets/fonts/playfair_display/PlayfairDisplay-Italic-Variable.ttf
          style: italic
          weight: 400
        - asset: assets/fonts/playfair_display/PlayfairDisplay-Italic-Variable.ttf
          style: italic
          weight: 600
        - asset: assets/fonts/playfair_display/PlayfairDisplay-Italic-Variable.ttf
          style: italic
          weight: 700
